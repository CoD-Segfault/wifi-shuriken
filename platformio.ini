[platformio]
default_envs = xiao_rp2350_controller, xiao_esp32c5_scanner
extra_configs = platformio.local.ini

[pico_controller_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/patch_tinyusb_cdc.py
build_src_filter =
    +<controller_main.cpp>
    +<controller_gnss_runtime.cpp>
    +<controller_scanner_runtime.cpp>
lib_deps =
    greiman/SdFat@^2.2.3
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit NeoPixel@^1.12.0
    urban-machine/xxHash@0.8.1-pio.1
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUSB_CONFIG_FILE=\"custom_tusb_config.h\"
    -Iinclude
    -DWIFI_DEDUPE_HASH_BITS=64

[env:pico2_controller]
extends = pico_controller_base
board = rpipico2
build_flags =
    ${pico_controller_base.build_flags}
    ; Legacy Pico2 PoC deltas from the XIAO-oriented defaults in Configuration.h.
    -DGNSS_UART=Serial2
    -DGNSS_TX=8
    -DGNSS_RX=9
    -DSD_PIN_CS=5
    -DESP_PIN_CS=13
    -DSCANNER_USE_SHIFTREG_CS=0
    -DSCANNER_SHIFTREG_OE_PIN=16
    -DSCANNER_SHIFTREG_LATCH_PIN=15
    -DRGB_PIN=14

[env:xiao_rp2350_controller]
extends = pico_controller_base
board = seeed_xiao_rp2350

[esp32_scanner_base]
platform = https://github.com/pioarduino/platform-espressif32.git#develop
framework = arduino
monitor_speed = 115200
build_src_filter = +<scanner_main.cpp>
lib_deps =
    urban-machine/xxHash@0.8.1-pio.1
build_flags =
    -Iinclude
    -DLOG_DEDUPE_HITS=1
    -DWIFI_DEDUPE_HASH_BITS=64

[env:esp32c5_devkit_scanner]
extends = esp32_scanner_base
board = esp32-c5-devkitc1-n8r4
build_flags =
    ${esp32_scanner_base.build_flags}
    -DPIN_SCK=6
    -DPIN_MOSI=1
    -DPIN_MISO=0
    -DPIN_CS=24
    -DSCANNER_SPI_MISO_DRIVE_CAP=GPIO_DRIVE_CAP_3

[env:xiao_esp32c5_scanner]
extends = esp32_scanner_base
board = seeed_xiao_esp32c5
build_flags =
    ${esp32_scanner_base.build_flags}
    ; Route Serial to USB CDC on boot. Pin/LED/SPI drive defaults live in code.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[native_test_base]
platform = native
test_framework = unity
lib_deps =
    urban-machine/xxHash@0.8.1-pio.1
build_flags =
    -Iinclude
    -DLOG_DEDUPE_HITS=0

[env:native_tests]
extends = native_test_base
build_flags =
    ${native_test_base.build_flags}
    -DWIFI_DEDUPE_HASH_BITS=64

[env:native_tests_hash32]
extends = native_test_base
build_flags =
    ${native_test_base.build_flags}
    -DWIFI_DEDUPE_HASH_BITS=32

[env:native_tests_hash128]
extends = native_test_base
build_flags =
    ${native_test_base.build_flags}
    -DWIFI_DEDUPE_HASH_BITS=128
