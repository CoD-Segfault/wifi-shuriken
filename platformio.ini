[platformio]
default_envs = pico2_controller

[env:pico2_controller]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
monitor_port = COM19
monitor_speed = 115200
extra_scripts = pre:scripts/patch_tinyusb_cdc.py
build_src_filter = +<controller_main.cpp>
lib_deps = 
    greiman/SdFat@^2.2.3
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit NeoPixel@^1.12.0
    urban-machine/xxHash@0.8.1-pio.1
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUSB_CONFIG_FILE=\"custom_tusb_config.h\"
    -Iinclude
    -DLOG_DEDUPE_HITS=1
    -DWIFI_DEDUPE_HASH_BITS=64

[env:xiao_rp2350_controller]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = seeed_xiao_rp2350
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/patch_tinyusb_cdc.py
build_src_filter = +<controller_main.cpp>
lib_deps =
    greiman/SdFat@^2.2.3
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit NeoPixel@^1.12.0
    urban-machine/xxHash@0.8.1-pio.1
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUSB_CONFIG_FILE=\"custom_tusb_config.h\"
    -Iinclude
    -DLOG_DEDUPE_HITS=1
    -DWIFI_DEDUPE_HASH_BITS=64
    ; GNSS on XIAO D6/D7 (GPIO0/GPIO1) using Serial1.
    -DGNSS_UART=Serial1
    -DGNSS_TX=0
    -DGNSS_RX=1
    ; SD on XIAO D8/D9/D10/D11 (GPIO2/GPIO4/GPIO3/GPIO21).
    -DSD_PIN_SCK=2
    -DSD_PIN_MISO=4
    -DSD_PIN_MOSI=3
    -DSD_PIN_CS=21
    ; Scanner SPI on XIAO D17/D16/D15 (GPIO10/GPIO12/GPIO11).
    -DESP_PIN_SCK=10
    -DESP_PIN_MISO=12
    -DESP_PIN_MOSI=11
    ; Shift-register scanner CS control: OE on D18 (GPIO9), latch on D0 (GPIO26).
    -DSCANNER_USE_SHIFTREG_CS=1
    -DSCANNER_SHIFTREG_OE_PIN=9
    -DSCANNER_SHIFTREG_LATCH_PIN=26
    ; XIAO RP2350 onboard WS2812: data on GPIO22, power-enable on GPIO23.
    -DRGB_PIN=22
    -DRGB_POWER_PIN=23

[env:esp32c5_devkit_scanner]
platform = https://github.com/pioarduino/platform-espressif32.git#develop
board = esp32-c5-devkitc1-n8r4
framework = arduino
upload_port = COM18
monitor_speed = 115200
monitor_port = COM18
build_src_filter = +<scanner_main.cpp>
lib_deps =
    urban-machine/xxHash@0.8.1-pio.1
build_flags = 
    -DPIN_SCK=6
    -DPIN_MOSI=1
    -DPIN_MISO=0
    -DPIN_CS=24
    -DLOG_DEDUPE_HITS=1
    -DWIFI_DEDUPE_HASH_BITS=64

[env:xiao_esp32c5_scanner]
platform = https://github.com/pioarduino/platform-espressif32.git#develop
board = seeed_xiao_esp32c5
framework = arduino
monitor_speed = 115200
build_src_filter = +<scanner_main.cpp>
lib_deps =
    urban-machine/xxHash@0.8.1-pio.1
build_flags = 
    ; Route Serial to USB CDC on boot.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DPIN_SCK=8
    -DPIN_MOSI=10
    -DPIN_MISO=9
    -DPIN_CS=7
    -DSCANNER_STATUS_LED_PIN=27
    -DSCANNER_STATUS_LED_ACTIVE_LOW=1
    -DLOG_DEDUPE_HITS=1
    -DWIFI_DEDUPE_HASH_BITS=64

[env:native_tests]
platform = native
test_framework = unity
build_flags =
    -Iinclude
    -DLOG_DEDUPE_HITS=0
    -DWIFI_DEDUPE_HASH_BITS=64
lib_deps =
    urban-machine/xxHash@0.8.1-pio.1

