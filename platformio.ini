platform = native
test_framework = unity
build_flags =
    -Iinclude
    -DLOG_DEDUPE_HITS=0
    -DWIFI_DEDUPE_HASH_BITS=32
lib_deps =
    urban-machine/xxHash@0.8.1-pio.1

[env:native_tests_hash128]
platform = native
