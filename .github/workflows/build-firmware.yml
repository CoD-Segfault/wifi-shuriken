name: Build Firmware

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade "platformio==6.1.19"

      - name: Create CI local config
        run: |
          if [ ! -f platformio.local.ini ]; then
            : > platformio.local.ini
          fi

      - name: Build all firmware environments
        run: |
          pio run \
            -e pico2_controller \
            -e xiao_rp2350_controller \
            -e esp32c5_devkit_scanner \
            -e xiao_esp32c5_scanner

      - name: Collect build artifacts
        run: |
          mkdir -p dist
          cp .pio/build/pico2_controller/firmware.uf2 dist/pico2_controller.uf2
          cp .pio/build/xiao_rp2350_controller/firmware.uf2 dist/xiao_rp2350_controller.uf2
          cp .pio/build/esp32c5_devkit_scanner/firmware.factory.bin dist/esp32c5_devkit_scanner-merged.bin
          cp .pio/build/xiao_esp32c5_scanner/firmware.factory.bin dist/xiao_esp32c5_scanner-merged.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-artifacts
          if-no-files-found: error
          path: dist/
